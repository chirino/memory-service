name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'docs/**'
      - '*.md'
      - '.skills/**'
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'docs/**'
      - '*.md'
      - '.skills/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-generated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            .github/cache/go-verify-generated.sum

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: |
            **/pom.xml
            .github/cache/maven-verify-generated.key

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            frontends/chat-frontend/package-lock.json
            site/package-lock.json
            .github/cache/npm-verify-generated.key

      - name: Generate Source Code
        run: |
          go run github.com/go-task/task/v3/cmd/task generate

      - name: Check for uncommitted changes
        run: |
          if [ "$(git diff --ignore-space-at-eol | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build.  See status below:"
            git diff
            echo "========================================================"
            echo "  run 'task generate' and commit the changes"
            echo "========================================================"
            exit 1
          fi

  test-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            .github/cache/go-test-go.sum

      - name: Run Go Tests
        run: |
          mkdir -p reports
          export GODOG_REPORT_DIR=./reports
          export GODOG_REPORT_FORMAT=cucumber
          go run github.com/go-task/task/v3/cmd/task test:go

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-go
          path: '**/reports'

      - name: Create Cucumber report files
        if: always()
        continue-on-error: true
        run: |
          go run ./internal/cmd/create-cucumber-reports \
            --input-dir . \
            --output-dir .artifacts \
            --output-stem cucumber-report \
            --max-items 50

      - name: Add Cucumber summary to job
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        uses: deblockt/cucumber-report-annotations-action@c240de1ffc48641595ff0c8b5ad70cf069701530 # v1.21
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
          path: .artifacts/cucumber-report-*.json
          name: Cucumber report (test-go)
          show-global-summary-report: true
          ignore-no-report-found: true

  test-site:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            .github/cache/go-test-site.sum

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: |
            **/pom.xml
            .github/cache/maven-test-site.key

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            frontends/chat-frontend/package-lock.json
            site/package-lock.json
            .github/cache/npm-test-site.key

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Run Site Tests
        run: |
          mkdir -p reports
          export GODOG_REPORT_DIR=./reports
          export GODOG_REPORT_FORMAT=cucumber
          export SITE_TEST_SCENARIO_CONCURRENCY=2
          go run github.com/go-task/task/v3/cmd/task test:site

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-site
          path: '**/reports'

      - name: Create Cucumber report files
        if: always()
        continue-on-error: true
        run: |
          go run ./internal/cmd/create-cucumber-reports \
            --input-dir . \
            --output-dir .artifacts \
            --output-stem cucumber-report \
            --max-items 50

      - name: Add Cucumber summary to job
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        uses: deblockt/cucumber-report-annotations-action@c240de1ffc48641595ff0c8b5ad70cf069701530 # v1.21
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
          path: .artifacts/cucumber-report-*.json
          name: Cucumber report (test-site)
          show-global-summary-report: true
          ignore-no-report-found: true

  test-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: |
            **/pom.xml
            .github/cache/maven-test-java.key

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            frontends/chat-frontend/package-lock.json
            site/package-lock.json
            .github/cache/npm-test-java.key

      - name: Run Java Tests
        run: ./java/mvnw -T 1C -f java/pom.xml clean install

      - name: Add JUnit summary to job
        if: always()
        continue-on-error: true
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          check_name: JUnit report (test-java)
          detailed_summary: true
          fail_on_parse_error: true

  images:
    runs-on: ${{ endsWith(matrix.job, 'linux-arm64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        job:
          - image-memory-service-linux-amd64
          - image-memory-service-linux-arm64
          - image-chat-quarkus-linux-amd64
          - image-chat-quarkus-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Prepare Docker image metadata
        id: docker-meta
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.job }}" in
            image-memory-service-linux-amd64)
              image="memory-service"
              dockerfile="Dockerfile"
              platform="linux/amd64"
              platform_key="linux-amd64"
              cache_scope="image-memory-service-linux-amd64"
              cache_fallback_scope="image-memory-service"
              build_args="VERSION=${{ github.sha }}"
              ;;
            image-memory-service-linux-arm64)
              image="memory-service"
              dockerfile="Dockerfile"
              platform="linux/arm64"
              platform_key="linux-arm64"
              cache_scope="image-memory-service-linux-arm64"
              cache_fallback_scope="image-memory-service"
              build_args="VERSION=${{ github.sha }}"
              ;;
            image-chat-quarkus-linux-amd64)
              image="memory-service-chat-quarkus"
              dockerfile="java/quarkus/examples/chat-quarkus/Dockerfile"
              platform="linux/amd64"
              platform_key="linux-amd64"
              cache_scope="image-chat-quarkus-linux-amd64"
              cache_fallback_scope="image-chat-quarkus"
              build_args=""
              ;;
            image-chat-quarkus-linux-arm64)
              image="memory-service-chat-quarkus"
              dockerfile="java/quarkus/examples/chat-quarkus/Dockerfile"
              platform="linux/arm64"
              platform_key="linux-arm64"
              cache_scope="image-chat-quarkus-linux-arm64"
              cache_fallback_scope="image-chat-quarkus"
              build_args=""
              ;;
            *)
              echo "Unsupported Docker matrix job: ${{ matrix.job }}" >&2
              exit 1
              ;;
          esac

          should_build=false
          if [[ "$GITHUB_REF" == "refs/heads/main" || "$platform" == "linux/amd64" ]]; then
            should_build=true
          fi

          {
            echo "image=$image"
            echo "image-ref=ghcr.io/${{ github.repository_owner }}/$image"
            echo "dockerfile=$dockerfile"
            echo "platform=$platform"
            echo "platform-key=$platform_key"
            echo "cache-scope=$cache_scope"
            echo "cache-fallback-scope=$cache_fallback_scope"
            echo "should-build=$should_build"
            echo "build-args<<EOF"
            echo "$build_args"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.docker-meta.outputs.should-build == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        if: steps.docker-meta.outputs.should-build == 'true' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: steps.docker-meta.outputs.should-build == 'true' && github.ref != 'refs/heads/main'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ steps.docker-meta.outputs.dockerfile }}
          platforms: ${{ steps.docker-meta.outputs.platform }}
          push: false
          tags: ${{ steps.docker-meta.outputs.image-ref }}:latest
          build-args: ${{ steps.docker-meta.outputs.build-args }}
          cache-from: |
            type=gha,scope=${{ steps.docker-meta.outputs.cache-scope }}
            type=gha,scope=${{ steps.docker-meta.outputs.cache-fallback-scope }}
          cache-to: type=gha,mode=max,scope=${{ steps.docker-meta.outputs.cache-scope }}

      - name: Build and push Docker image by digest
        id: docker-build
        if: steps.docker-meta.outputs.should-build == 'true' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ steps.docker-meta.outputs.dockerfile }}
          platforms: ${{ steps.docker-meta.outputs.platform }}
          tags: ${{ steps.docker-meta.outputs.image-ref }}
          outputs: type=image,name=${{ steps.docker-meta.outputs.image-ref }},push-by-digest=true,name-canonical=true,push=true
          build-args: ${{ steps.docker-meta.outputs.build-args }}
          cache-from: |
            type=gha,scope=${{ steps.docker-meta.outputs.cache-scope }}
            type=gha,scope=${{ steps.docker-meta.outputs.cache-fallback-scope }}
          cache-to: type=gha,mode=max,scope=${{ steps.docker-meta.outputs.cache-scope }}

      - name: Export Docker digest
        if: steps.docker-meta.outputs.should-build == 'true' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          digest="${{ steps.docker-build.outputs.digest }}"
          mkdir -p "/tmp/digests/${{ steps.docker-meta.outputs.image }}"
          touch "/tmp/digests/${{ steps.docker-meta.outputs.image }}/${digest#sha256:}"

      - name: Upload Docker digest
        if: steps.docker-meta.outputs.should-build == 'true' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-docker-digest-${{ steps.docker-meta.outputs.image }}-${{ steps.docker-meta.outputs.platform-key }}
          path: /tmp/digests
          if-no-files-found: error
          retention-days: 1

  artifacts:
    runs-on: ${{ matrix.job == 'artifact-memory-service-macos-arm64' && 'macos-26' || (endsWith(matrix.job, 'linux-arm64') && 'ubuntu-24.04-arm' || 'ubuntu-latest') }}
    strategy:
      fail-fast: true
      matrix:
        job:
          - artifact-memory-service-linux-amd64
          - artifact-memory-service-linux-arm64
          - artifact-memory-service-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Prepare binary artifact metadata
        id: artifact-meta
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.job }}" in
            artifact-memory-service-linux-amd64)
              platform="linux/amd64"
              platform_key="linux-amd64"
              artifact_name="memory-service-linux-amd64"
              ;;
            artifact-memory-service-linux-arm64)
              platform="linux/arm64"
              platform_key="linux-arm64"
              artifact_name="memory-service-linux-arm64"
              ;;
            artifact-memory-service-macos-arm64)
              platform="darwin/arm64"
              platform_key="macos-arm64"
              artifact_name="memory-service-macos-arm64"
              ;;
            *)
              echo "Unsupported artifact matrix job: ${{ matrix.job }}" >&2
              exit 1
              ;;
          esac

          {
            echo "platform=$platform"
            echo "platform-key=$platform_key"
            echo "artifact-name=$artifact_name"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx for portable Linux artifact
        if: startsWith(matrix.job, 'artifact-memory-service-linux-')
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build portable Linux binary artifact
        if: startsWith(matrix.job, 'artifact-memory-service-linux-')
        shell: bash
        run: |
          set -euo pipefail

          image="memory-service-portable:${{ steps.artifact-meta.outputs.platform-key }}"
          docker buildx build \
            --load \
            --platform "${{ steps.artifact-meta.outputs.platform }}" \
            --build-arg "VERSION=${{ github.sha }}" \
            -t "$image" \
            -f Dockerfile.portable .

          mkdir -p dist
          cid="$(docker create "$image")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "$cid":/memory-service dist/memory-service
          chmod +x dist/memory-service

      - name: Set up Go for macOS artifact
        if: matrix.job == 'artifact-memory-service-macos-arm64'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build macOS arm64 binary artifact
        if: matrix.job == 'artifact-memory-service-macos-arm64'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build \
              -buildvcs=false \
              -tags "sqlite_fts5 sqlite_json" \
              -ldflags "-X main.Version=${{ github.sha }}" \
              -o dist/memory-service .
          chmod +x dist/memory-service

      - name: Smoke test binary
        shell: bash
        run: |
          set -euo pipefail
          actual="$(dist/memory-service version)"
          if [ "$actual" != "${{ github.sha }}" ]; then
            echo "Expected version ${{ github.sha }}, got $actual" >&2
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.artifact-meta.outputs.artifact-name }}
          path: dist/memory-service
          if-no-files-found: error

  test-binary-jars:
    needs: artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Download native binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: memory-service-*
          path: /tmp/ci-binaries
          merge-multiple: false

      - name: Stage Maven binary inputs
        shell: bash
        run: |
          set -euo pipefail

          stage=/tmp/memory-service-binaries
          mkdir -p "$stage"
          stage_binary() {
            local artifact="$1"
            local platform="$2"
            local source="/tmp/ci-binaries/$artifact/memory-service"
            local target="$stage/$platform"
            if [ ! -f "$source" ]; then
              echo "Missing native artifact $source" >&2
              exit 1
            fi
            mkdir -p "$target"
            cp "$source" "$target/memory-service"
            chmod +x "$target/memory-service"
            sha256sum "$target/memory-service" | sed 's#  .*/#  #' > "$target/memory-service.sha256"
          }

          stage_binary memory-service-linux-amd64 linux-amd64
          stage_binary memory-service-linux-arm64 linux-arm64
          stage_binary memory-service-macos-arm64 macos-arm64

      - name: Build and test native binary JARs
        run: |
          ./java/mvnw -B -f java/pom.xml \
            -Pbinary-jars \
            -Dmemory-service.binaries.dir=/tmp/memory-service-binaries \
            -Dmemory-service.packaged.test=true \
            -pl :memory-service-binaries -am clean verify

      - name: Inspect packaged resources
        shell: bash
        run: |
          set -euo pipefail
          jar tf java/memory-service-binary-linux-amd64/target/memory-service-binary-linux-amd64-*.jar \
            | grep -Fx 'META-INF/memory-service/linux-amd64/memory-service'
          jar tf java/memory-service-binary-linux-arm64/target/memory-service-binary-linux-arm64-*.jar \
            | grep -Fx 'META-INF/memory-service/linux-arm64/memory-service'
          jar tf java/memory-service-binary-macos-arm64/target/memory-service-binary-macos-arm64-*.jar \
            | grep -Fx 'META-INF/memory-service/macos-arm64/memory-service'

      - name: Validate aggregate Java module path
        shell: bash
        run: |
          set -euo pipefail
          jars=(
            java/memory-service-process/target/memory-service-process-*.jar
            java/memory-service-binary-linux-amd64/target/memory-service-binary-linux-amd64-*.jar
            java/memory-service-binary-linux-arm64/target/memory-service-binary-linux-arm64-*.jar
            java/memory-service-binary-macos-arm64/target/memory-service-binary-macos-arm64-*.jar
            java/memory-service-binaries/target/memory-service-binaries-*.jar
          )
          module_path="$(IFS=:; echo "${jars[*]}")"
          java --validate-modules --module-path "$module_path"

  image-manifest:
    needs: images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ci-docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Docker manifests
        shell: bash
        run: |
          set -euo pipefail

          create_manifest() {
            local image="$1"
            local image_ref="ghcr.io/${{ github.repository_owner }}/$image"
            local digest_refs=()

            while IFS= read -r digest_file; do
              digest_refs+=("$image_ref@sha256:$(basename "$digest_file")")
            done < <(find "/tmp/digests/$image" -type f | sort)

            if [ "${#digest_refs[@]}" -eq 0 ]; then
              echo "No digests found for $image" >&2
              exit 1
            fi

            docker buildx imagetools create -t "$image_ref:latest" "${digest_refs[@]}"
          }

          create_manifest memory-service
          create_manifest memory-service-chat-quarkus
