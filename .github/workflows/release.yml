name: Release Java and Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v, for example 0.0.1
        required: true
        type: string
      update_latest:
        description: Also update the latest Docker tags
        required: true
        default: true
        type: boolean
      create_github_release:
        description: Create a GitHub Release after publishing artifacts
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Validate release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like 0.0.1, without a leading v" >&2
            exit 1
          fi
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "Release version cannot contain SNAPSHOT" >&2
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "tag=v$VERSION"
            echo "branch=release/v$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Prepare release ref
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${{ steps.release.outputs.branch }}"
          TAG="${{ steps.release.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$TAG:refs/tags/$TAG"
            git switch --detach "$TAG"
            echo "Release tag $TAG already exists; continuing from the tagged commit"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git switch -C "$BRANCH" "origin/$BRANCH"
          else
            git switch -c "$BRANCH"
            git push --set-upstream origin "$BRANCH"
          fi

      - name: Commit release version
        if: steps.prepare.outputs.tag_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.release.outputs.version }}"
          ./java/mvnw -q -B -f java/pom.xml versions:set \
            -DnewVersion="$VERSION" \
            -DgenerateBackupPoms=false

          if git diff --quiet; then
            echo "Release branch already has Maven version $VERSION"
          else
            git add java
            git commit -s -m "chore(release): prepare $VERSION"
            git push
          fi

      - name: Check Maven Central artifacts
        id: maven-central
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.release.outputs.version }}"
          URL="https://repo1.maven.org/maven2/io/github/chirino/memory-service/memory-service-parent/$VERSION/memory-service-parent-$VERSION.pom"

          if curl --silent --fail --head "$URL" >/dev/null; then
            echo "Java artifacts for $VERSION are already available in Maven Central"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "Java artifacts for $VERSION are not available in Maven Central yet"
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Java release bundle
        if: steps.maven-central.outputs.published != 'true'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          go run github.com/go-task/task/v3/cmd/task release:java:bundle VERSION="${{ steps.release.outputs.version }}" -- -q -B

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker-tags
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.release.outputs.version }}"
          OWNER="${{ github.repository_owner }}"

          memory_tags="ghcr.io/$OWNER/memory-service:$VERSION"
          chat_tags="ghcr.io/$OWNER/memory-service-chat-quarkus:$VERSION"

          if [[ "${{ inputs.update_latest }}" == "true" ]]; then
            memory_tags="$memory_tags"$'\n'"ghcr.io/$OWNER/memory-service:latest"
            chat_tags="$chat_tags"$'\n'"ghcr.io/$OWNER/memory-service-chat-quarkus:latest"
          fi

          {
            echo "memory-tags<<EOF"
            echo "$memory_tags"
            echo "EOF"
            echo "chat-tags<<EOF"
            echo "$chat_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image (memory-service)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.memory-tags }}
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
          cache-from: type=gha,scope=image-memory-service
          cache-to: type=gha,mode=max,scope=image-memory-service

      - name: Build and push Docker image (chat-quarkus)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: java/quarkus/examples/chat-quarkus/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.chat-tags }}
          cache-from: type=gha,scope=image-chat-quarkus
          cache-to: type=gha,mode=max,scope=image-chat-quarkus

      - name: Publish Java artifacts to Maven Central
        if: steps.maven-central.outputs.published != 'true'
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.release.outputs.version }}"
          URL="https://repo1.maven.org/maven2/io/github/chirino/memory-service/memory-service-parent/$VERSION/memory-service-parent-$VERSION.pom"

          set +e
          go run github.com/go-task/task/v3/cmd/task release:java VERSION="$VERSION" -- -q -B
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          echo "Maven Central publish failed; checking whether artifacts were published before the failure"
          if curl --silent --fail --head --retry 6 --retry-delay 10 "$URL" >/dev/null; then
            echo "Java artifacts for $VERSION are available in Maven Central; treating publish as complete"
            exit 0
          fi

          exit "$status"

      - name: Tag released version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.release.outputs.tag }}"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists"
            exit 0
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: inputs.create_github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub Release ${{ steps.release.outputs.tag }} already exists"
            exit 0
          fi
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "${{ steps.release.outputs.tag }}" \
            --notes "Java artifacts and Docker images for ${{ steps.release.outputs.tag }}."

      - name: Delete release branch
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${{ steps.release.outputs.branch }}"
          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Release branch $BRANCH is already absent"
            exit 0
          fi
          git push origin --delete "$BRANCH"
