name: Release Java, Docker, and Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v, for example 0.0.1
        required: true
        type: string
      update_latest:
        description: Also update the latest Docker tags
        required: true
        default: true
        type: boolean
      update_minor:
        description: Also update the X.Y Docker tag
        required: true
        default: true
        type: boolean
      create_github_release:
        description: Create a GitHub Release after publishing artifacts
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  MAVEN_ARGS: --no-transfer-progress

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    outputs:
      branch: ${{ steps.release.outputs.branch }}
      checkout-ref: ${{ steps.prepare.outputs.checkout-ref }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Validate release version
        id: release
        shell: bash
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          VERSION="$RELEASE_VERSION_INPUT"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like 0.0.1, without a leading v" >&2
            exit 1
          fi
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "Release version cannot contain SNAPSHOT" >&2
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "tag=v$VERSION"
            echo "branch=release/v$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Prepare release ref
        id: prepare
        shell: bash
        env:
          RELEASE_BRANCH: ${{ steps.release.outputs.branch }}
          RELEASE_SOURCE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          BRANCH="$RELEASE_BRANCH"
          SOURCE_SHA="$RELEASE_SOURCE_SHA"
          TAG="$RELEASE_TAG"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$TAG:refs/tags/$TAG"
            git switch --detach "$TAG"
            echo "Release tag $TAG already exists; continuing from the tagged commit"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "checkout-ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          echo "checkout-ref=$BRANCH" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git switch -C "$BRANCH" "origin/$BRANCH"
            git merge --no-edit "$SOURCE_SHA"
            git push origin "$BRANCH"
          else
            git switch -c "$BRANCH"
            git push --set-upstream origin "$BRANCH"
          fi

      - name: Commit release version
        if: steps.prepare.outputs.tag_exists != 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          VERSION="$RELEASE_VERSION"
          ./java/mvnw -q -B -f java/pom.xml -Pbinary-jars versions:set \
            -DnewVersion="$VERSION" \
            -DgenerateBackupPoms=false

          if git diff --quiet; then
            echo "Release branch already has Maven version $VERSION"
          else
            git add java
            git commit -s -m "chore(release): prepare $VERSION"
            git push
          fi

  docker-build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: memory-service
            dockerfile: Dockerfile
            platform: linux/amd64
            platform-key: linux-amd64
            cache-scope: image-memory-service-linux-amd64
            cache-fallback-scope: image-memory-service
            runner: ubuntu-latest
          - image: memory-service
            dockerfile: Dockerfile
            platform: linux/arm64
            platform-key: linux-arm64
            cache-scope: image-memory-service-linux-arm64
            cache-fallback-scope: image-memory-service
            runner: ubuntu-24.04-arm
          - image: memory-service-chat-quarkus
            dockerfile: java/quarkus/examples/chat-quarkus/Dockerfile
            platform: linux/amd64
            platform-key: linux-amd64
            cache-scope: image-chat-quarkus-linux-amd64
            cache-fallback-scope: image-chat-quarkus
            runner: ubuntu-latest
          - image: memory-service-chat-quarkus
            dockerfile: java/quarkus/examples/chat-quarkus/Dockerfile
            platform: linux/arm64
            platform-key: linux-arm64
            cache-scope: image-chat-quarkus-linux-arm64
            cache-fallback-scope: image-chat-quarkus
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.checkout-ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          build-args: ${{ matrix.image == 'memory-service' && format('VERSION={0}', needs.prepare.outputs.version) || '' }}
          cache-from: |
            type=gha,scope=${{ matrix.cache-scope }}
            type=gha,scope=${{ matrix.cache-fallback-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}

      - name: Export digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          set -euo pipefail

          digest="$IMAGE_DIGEST"
          mkdir -p "/tmp/digests/$IMAGE_NAME"
          touch "/tmp/digests/$IMAGE_NAME/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-docker-digest-${{ matrix.image }}-${{ matrix.platform-key }}
          path: /tmp/digests
          if-no-files-found: error
          retention-days: 1

  binary-artifact:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            platform-key: linux-amd64
            artifact-name: memory-service-linux-amd64
            runner: ubuntu-latest
            build-kind: docker
          - platform: linux/arm64
            platform-key: linux-arm64
            artifact-name: memory-service-linux-arm64
            runner: ubuntu-24.04-arm
            build-kind: docker
          - platform: darwin/arm64
            platform-key: macos-arm64
            artifact-name: memory-service-macos-arm64
            runner: macos-26
            build-kind: go
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.checkout-ref }}

      - name: Set up Docker Buildx
        if: matrix.build-kind == 'docker'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build portable Linux binary artifact
        if: matrix.build-kind == 'docker'
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          PLATFORM_KEY: ${{ matrix.platform-key }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          image="memory-service-portable:$PLATFORM_KEY"
          docker buildx build \
            --load \
            --platform "$PLATFORM" \
            --build-arg "VERSION=$RELEASE_VERSION" \
            -t "$image" \
            -f Dockerfile.portable .

          mkdir -p dist
          cid="$(docker create "$image")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "$cid":/memory-service dist/memory-service
          chmod +x dist/memory-service

      - name: Set up Go
        if: matrix.build-kind == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS arm64 binary artifact
        if: matrix.build-kind == 'go'
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build \
              -buildvcs=false \
              -tags "sqlite_fts5 sqlite_json" \
              -ldflags "-X main.Version=$RELEASE_VERSION" \
              -o dist/memory-service .
          chmod +x dist/memory-service

      - name: Smoke test binary
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          actual="$(dist/memory-service version)"
          if [ "$actual" != "$RELEASE_VERSION" ]; then
            echo "Expected version $RELEASE_VERSION, got $actual" >&2
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-binary-${{ matrix.artifact-name }}
          path: dist/memory-service
          if-no-files-found: error

  java-release:
    needs:
      - prepare
      - binary-artifact
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.checkout-ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Download native binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-binary-*
          path: /tmp/release-binaries
          merge-multiple: false

      - name: Stage Maven binary inputs
        shell: bash
        run: |
          set -euo pipefail

          stage=/tmp/memory-service-binaries
          mkdir -p "$stage"
          stage_binary() {
            local artifact="$1"
            local platform="$2"
            local source="/tmp/release-binaries/release-binary-$artifact/memory-service"
            local target="$stage/$platform"
            if [ ! -f "$source" ]; then
              echo "Missing native artifact $source" >&2
              exit 1
            fi
            mkdir -p "$target"
            cp "$source" "$target/memory-service"
            chmod +x "$target/memory-service"
            sha256sum "$target/memory-service" | sed 's#  .*/#  #' > "$target/memory-service.sha256"
          }

          stage_binary memory-service-linux-amd64 linux-amd64
          stage_binary memory-service-linux-arm64 linux-arm64
          stage_binary memory-service-macos-arm64 macos-arm64

      - name: Check Maven Central artifacts
        id: maven-central
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          base="https://repo1.maven.org/maven2/io/github/chirino/memory-service"
          version="$RELEASE_VERSION"
          artifacts=(
            "memory-service-parent/$version/memory-service-parent-$version.pom"
            "memory-service-process/$version/memory-service-process-$version.jar"
            "memory-service-binary-linux-amd64/$version/memory-service-binary-linux-amd64-$version.jar"
            "memory-service-binary-linux-arm64/$version/memory-service-binary-linux-arm64-$version.jar"
            "memory-service-binary-macos-arm64/$version/memory-service-binary-macos-arm64-$version.jar"
            "memory-service-binaries/$version/memory-service-binaries-$version.jar"
          )
          published=true
          for artifact in "${artifacts[@]}"; do
            if ! curl --silent --fail --head "$base/$artifact" >/dev/null; then
              published=false
            fi
          done
          echo "published=$published" >> "$GITHUB_OUTPUT"

      - name: Validate Java release bundle
        if: steps.maven-central.outputs.published != 'true'
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go run github.com/go-task/task/v3/cmd/task release:java:bundle \
            VERSION="$RELEASE_VERSION" \
            BINARIES_DIR=/tmp/memory-service-binaries \
            -- -q -B

      - name: Publish Java artifacts to Maven Central
        if: steps.maven-central.outputs.published != 'true'
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          set +e
          go run github.com/go-task/task/v3/cmd/task release:java \
            VERSION="$RELEASE_VERSION" \
            BINARIES_DIR=/tmp/memory-service-binaries \
            -- -q -B
          publish_status=$?
          set -e
          if [ "$publish_status" -eq 0 ]; then
            exit 0
          fi

          echo "Maven Central publish failed; checking whether the complete artifact set was published"
          base="https://repo1.maven.org/maven2/io/github/chirino/memory-service"
          version="$RELEASE_VERSION"
          artifacts=(
            "memory-service-parent/$version/memory-service-parent-$version.pom"
            "memory-service-process/$version/memory-service-process-$version.jar"
            "memory-service-binary-linux-amd64/$version/memory-service-binary-linux-amd64-$version.jar"
            "memory-service-binary-linux-arm64/$version/memory-service-binary-linux-arm64-$version.jar"
            "memory-service-binary-macos-arm64/$version/memory-service-binary-macos-arm64-$version.jar"
            "memory-service-binaries/$version/memory-service-binaries-$version.jar"
          )
          for artifact in "${artifacts[@]}"; do
            curl --silent --fail --head --retry 6 --retry-delay 10 "$base/$artifact" >/dev/null \
              || exit "$publish_status"
          done
          echo "Complete Java artifact set is available in Maven Central"

  docker-manifest:
    needs:
      - prepare
      - docker-build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Docker manifests
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          UPDATE_LATEST: ${{ inputs.update_latest }}
          UPDATE_MINOR: ${{ inputs.update_minor }}
        run: |
          set -euo pipefail

          create_manifest() {
            local image="$1"
            local image_ref="ghcr.io/$REPOSITORY_OWNER/$image"
            local version="$RELEASE_VERSION"
            local tag_args=("-t" "$image_ref:$version")
            local digest_refs=()

            # Stable patch releases can advance their verified compatibility line.
            # Prereleases never update the X.Y tag.
            if [[ "$UPDATE_MINOR" == "true" && "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              tag_args+=("-t" "$image_ref:${BASH_REMATCH[1]}.${BASH_REMATCH[2]}")
            fi

            if [[ "$UPDATE_LATEST" == "true" ]]; then
              tag_args+=("-t" "$image_ref:latest")
            fi

            while IFS= read -r digest_file; do
              digest_refs+=("$image_ref@sha256:$(basename "$digest_file")")
            done < <(find "/tmp/digests/$image" -type f | sort)

            if [ "${#digest_refs[@]}" -eq 0 ]; then
              echo "No digests found for $image" >&2
              exit 1
            fi

            docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"
          }

          create_manifest memory-service
          create_manifest memory-service-chat-quarkus

  finish:
    needs:
      - prepare
      - java-release
      - docker-manifest
      - binary-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.checkout-ref }}
          fetch-depth: 0

      - name: Download binary artifacts
        if: inputs.create_github_release
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-binary-*
          path: /tmp/release-binaries
          merge-multiple: false

      - name: Tag released version
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          TAG="$RELEASE_TAG"
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: inputs.create_github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists"
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes "Java artifacts, Docker images, and native binary ZIPs for $RELEASE_TAG."

      - name: Upload GitHub Release binary artifacts
        if: inputs.create_github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p /tmp/release-assets
          for artifact_dir in /tmp/release-binaries/release-binary-*; do
            [ -d "$artifact_dir" ] || continue
            asset_name="${artifact_dir##*/release-binary-}.zip"
            if [ ! -f "$artifact_dir/memory-service" ]; then
              echo "Missing memory-service binary in $artifact_dir" >&2
              exit 1
            fi
            (cd "$artifact_dir" && zip -q "/tmp/release-assets/$asset_name" memory-service)
          done

          assets=(/tmp/release-assets/*.zip)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No binary artifacts found" >&2
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

      - name: Delete release branch
        shell: bash
        env:
          RELEASE_BRANCH: ${{ needs.prepare.outputs.branch }}
        run: |
          set -euo pipefail

          BRANCH="$RELEASE_BRANCH"
          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Release branch $BRANCH is already absent"
            exit 0
          fi
          git push origin --delete "$BRANCH"
