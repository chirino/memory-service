syntax = "proto3";
package memory.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "io.github.chirino.memory.grpc.v1";
option go_package = "github.com/chirino/memory-service/internal/generated/pb";

// Authentication and effective user identity are supplied as gRPC metadata,
// not as request message fields. Callers authenticate with `authorization`
// and/or `x-api-key`. The normal user services honor `x-user-id` only when the
// authenticated client is configured in MEMORY_SERVICE_TRUSTED_USER_ID_CLIENTS;
// otherwise the metadata is ignored. Admin and system services always ignore
// `x-user-id`.

// UUID fields are represented as 16-byte big-endian binary values.
// Use the most significant 64 bits first, then least significant 64 bits.
// Example conversion (Java):
//   ByteBuffer buffer = ByteBuffer.allocate(16);
//   buffer.putLong(uuid.getMostSignificantBits());
//   buffer.putLong(uuid.getLeastSignificantBits());
//   return buffer.array();

message PageRequest {
  string page_token = 1;
  int32 page_size = 2;
}

message PageInfo {
  string next_page_token = 1;
  string previous_page_token = 2; // Empty when no older page exists.
}

// ConversationListMode controls which conversations are returned from each fork tree.
// Conversations can be forked to create branches. All forks share the same
// "conversation group" (fork tree). This mode determines which conversations
// from each fork tree are included in list results.
enum ConversationListMode {
  // Unspecified defaults to LATEST_FORK.
  CONVERSATION_LIST_MODE_UNSPECIFIED = 0;
  // Include all conversations the user can access (roots and forks).
  ALL = 1;
  // Only include root conversations (conversations that are not forks).
  ROOTS = 2;
  // Include only the most recently updated conversation per fork tree (default).
  // This is useful for showing a single representative conversation from each tree.
  LATEST_FORK = 3;
}

enum ConversationAncestryFilter {
  CONVERSATION_ANCESTRY_FILTER_UNSPECIFIED = 0;
  CONVERSATION_ANCESTRY_FILTER_ROOTS = 1;
  CONVERSATION_ANCESTRY_FILTER_CHILDREN = 2;
  CONVERSATION_ANCESTRY_FILTER_ALL = 3;
}

enum ArchiveFilter {
  ARCHIVE_FILTER_UNSPECIFIED = 0;
  ARCHIVE_FILTER_EXCLUDE = 1;
  ARCHIVE_FILTER_INCLUDE = 2;
  ARCHIVE_FILTER_ONLY = 3;
}

enum EventScope {
  EVENT_SCOPE_UNSPECIFIED = 0;
  EVENT_SCOPE_AUTHORIZED = 1;
  EVENT_SCOPE_ADMIN = 2;
}

enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  OWNER = 1;
  MANAGER = 2;
  WRITER = 3;
  READER = 4;
}

enum Channel {
  CHANNEL_UNSPECIFIED = 0;
  HISTORY = 1;
  CONTEXT = 2;
  JOURNAL = 3;
}

message ConversationSummary {
  // Conversation identifier
  string id = 1;
  string title = 2;
  string owner_user_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string last_message_preview = 6;
  AccessLevel access_level = 7;
  string started_by_conversation_id = 8;
  bytes started_by_entry_id = 9;
  bool archived = 10;
  optional string agent_id = 11;
  google.protobuf.Struct metadata = 12;
  bytes forked_at_entry_id = 13;
  string forked_at_conversation_id = 14;
}

message ChildConversationSummary {
  // Conversation identifier
  string id = 1;
  string title = 2;
  string owner_user_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string last_message_preview = 6;
  AccessLevel access_level = 7;
  bytes started_by_entry_id = 8;
  bool archived = 9;
  string started_by_conversation_id = 10;
}

message Conversation {
  // Conversation identifier
  string id = 1;
  string title = 2;
  string owner_user_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string last_message_preview = 6;
  AccessLevel access_level = 7;
  reserved 8; // conversation_group_id removed
  // First parent entry excluded by this fork. Fork anchors may be history
  // entries or same-client-visible journal entries; context entries are
  // invalid anchors. Empty if root or blank-slate fork.
  bytes forked_at_entry_id = 9;
  // Conversation ID from which this was forked (empty if root)
  string forked_at_conversation_id = 10;
  string started_by_conversation_id = 11;
  bytes started_by_entry_id = 12;
  string agent_id = 13;
  bool archived = 14;
  google.protobuf.Struct metadata = 15;
  bool has_response_in_progress = 16;
}

message ConversationMembership {
  // Conversation identifier
  string conversation_id = 1;
  string user_id = 2;
  AccessLevel access_level = 3;
  string created_at = 4;
  reserved 5; // old conversation_group_id field number
}

message ConversationForkSummary {
  // Forked conversation identifier
  string conversation_id = 1;
  reserved 2; // conversation_group_id removed
  // First parent entry excluded by this fork. Fork anchors may be history
  // entries or same-client-visible journal entries; context entries are
  // invalid anchors.
  bytes forked_at_entry_id = 3;
  // Conversation ID from which this was forked
  string forked_at_conversation_id = 4;
  string title = 5;
  string created_at = 6;
}

message CreateConversationRequest {
  string title = 1;
  google.protobuf.Struct metadata = 2;
  optional string agent_id = 3;
  // Optional client-supplied conversation ID. When provided, the server
  // creates the conversation with this ID instead of generating one.
  optional string id = 4;
  optional string forked_at_conversation_id = 5;
  optional bytes forked_at_entry_id = 6; // UUID as 16-byte big-endian
}

message ListConversationsRequest {
  // Controls which conversations are returned from each fork tree.
  // See ConversationListMode for details on each mode.
  ConversationListMode mode = 1;
  // Optional text query for basic title/metadata search.
  string query = 2;
  PageRequest page = 3;
  ConversationAncestryFilter ancestry = 4;
  ArchiveFilter archived = 5;
}

message ListConversationsResponse {
  repeated ConversationSummary conversations = 1;
  PageInfo page_info = 2;
}

message GetConversationRequest {
  // Conversation identifier
  string conversation_id = 1;
}

message UpdateConversationRequest {
  // Conversation identifier
  string conversation_id = 1;
  optional string title = 2;
  optional bool archived = 3;
  optional google.protobuf.Struct metadata = 4;
}

message ListForksRequest {
  // Conversation identifier
  string conversation_id = 1;
  reserved 2; // pagination removed; navigation snapshots are complete
}

message ListForksResponse {
  repeated string conversation_ids = 1;
  repeated ConversationForkPoint fork_points = 2;
}

message ConversationForkPoint {
  bytes entry_id = 1;
  repeated ConversationForkOption options = 2;
}

message ConversationForkOption {
  string conversation_id = 1;
  optional bytes entry_id = 2;
  string title = 3;
  optional string preview = 4;
  string created_at = 5;
}

message ListChildConversationsRequest {
  string conversation_id = 1;
  PageRequest page = 2;
}

message ListChildConversationsResponse {
  repeated ChildConversationSummary conversations = 1;
  PageInfo page_info = 2;
}

message CreateEntryRequest {
  string user_id = 1;
  Channel channel = 2;
  reserved 3; // epoch removed - server auto-calculates epoch for context channel entries
  // Describes the schema/format of the content array.
  // History channel entries must use "history" as the content_type.
  // The content array for history entries must contain exactly 1 object with:
  //   - text (string): The message text.
  //   - role (string): Either "USER" or "AI".
  // Other content_types (e.g., "LC4J", "SpringAI") may be used for
  // agent context entries.
  string content_type = 4;
  // For history channel entries (content_type: "history"), each block
  // contains text and role fields.
  repeated google.protobuf.Value content = 5;
  // Optional text to index for search (history channel only)
  optional string indexed_content = 6;
  // Fork metadata: if the target conversation doesn't exist yet, auto-create
  // it as a fork of forked_at_conversation_id. Optionally provide
  // forked_at_entry_id to fork at a specific point. Valid fork anchors are
  // history entries and same-client-visible journal entries; context entries
  // are invalid anchors. When unset, all source entries are excluded and the
  // new entry becomes the first entry in the fork.
  optional string forked_at_conversation_id = 7;
  optional bytes forked_at_entry_id = 8;          // UUID as 16-byte big-endian
  optional string agent_id = 9;
  optional string started_by_conversation_id = 10;
  optional bytes started_by_entry_id = 11;
  // Optional client-assigned sequence number, unique within the conversation.
  optional uint32 seq = 12;
}

message SyncEntriesRequest {
  // Conversation identifier
  string conversation_id = 1;
  // Single entry containing all messages in the agent's context.
  // The content array holds all messages; comparison is done against
  // the flattened content of existing entries in the latest epoch.
  CreateEntryRequest entry = 2;
}

message SyncEntriesResponse {
  optional int64 epoch = 1;
  bool no_op = 2;
  bool epoch_incremented = 3;
  // The entry that was appended during this sync, or empty if no-op.
  optional Entry entry = 4;
}

message AppendEntryRequest {
  // Conversation identifier
  string conversation_id = 1;
  CreateEntryRequest entry = 2;
  optional int64 epoch = 3;
}

message AppendEntriesRequest {
  // Conversation identifier
  string conversation_id = 1;
  repeated CreateEntryRequest entries = 2;
  optional int64 epoch = 3;
}

message AppendEntriesResponse {
  repeated Entry entries = 1;
}

message ListEntriesRequest {
  // Conversation identifier
  string conversation_id = 1;
  Channel channel = 2;
  string epoch_filter = 3;
  PageRequest page = 4;
  // Controls which fork entries to include: "none" (default) follows ancestry,
  // "all" returns entries from all forks in the conversation group
  string forks = 5;
  // Return entries at or before this entry in the caller-visible conversation order.
  // Useful with channel=CONTEXT and epoch_filter to reconstruct context as of a history entry.
  optional bytes up_to_entry_id = 6;
  // When set, return only entries with seq >= from_seq, ordered by seq ASC.
  // Entries without a seq value are excluded.
  optional uint32 from_seq = 7;
  // Return up to page_size entries strictly before this token in the caller-visible order.
  // Mutually exclusive with page.page_token and tail.
  optional string before_page_token = 8;
  // When true, return the last page_size entries (newest page). Mutually exclusive with
  // page.page_token and before_page_token.
  optional bool tail = 9;
  // Optional agent identity filter. Requires an authenticated client ID.
  optional string agent_id = 10;
}

message ListEntriesResponse {
  repeated Entry entries = 1;
  PageInfo page_info = 2;
}

message AdminListEntriesRequest {
  // Conversation identifier
  string conversation_id = 1;
  Channel channel = 2;
  string epoch_filter = 3;
  PageRequest page = 4;
  // Controls which fork entries to include: "none" (default) follows ancestry,
  // "all" returns entries from all forks in the conversation group
  string forks = 5;
  // Return entries at or before this entry in the admin-visible conversation order.
  optional bytes up_to_entry_id = 6;
  // When set, return only entries with seq >= from_seq, ordered by seq ASC.
  // Entries without a seq value are excluded.
  optional uint32 from_seq = 7;
  // Return up to page_size entries strictly before this token in the admin-visible order.
  // Mutually exclusive with page.page_token and tail.
  optional string before_page_token = 8;
  // When true, return the last page_size entries (newest page). Mutually exclusive with
  // page.page_token and before_page_token.
  optional bool tail = 9;
}

message AdminGetConversationRequest {
  // Conversation identifier
  string conversation_id = 1;
  // Optional: admin/auditor justification, logged for admin access.
  optional string justification = 2;
}

message AdminGetEntryRequest {
  // Entry identifier (UUID as 16-byte big-endian binary)
  bytes entry_id = 1;
  // Optional: admin/auditor justification, logged for admin access.
  optional string justification = 2;
}

message AdminListConversationsRequest {
  reserved 3, 4; // unsupported client_id and agent_id filters removed
  PageRequest page = 1;
  // Optional: filter by owner user ID
  optional string owner_user_id = 2;
  // Optional: archive filter (exclude, include, only)
  optional ArchiveFilter archived = 5;
  // Optional: conversation list mode (all, roots, latest_fork)
  optional ConversationListMode mode = 6;
  // Optional: conversation ancestry filter (roots, children, all)
  optional ConversationAncestryFilter ancestry = 7;
  // Optional: include conversations archived at or after this time
  optional google.protobuf.Timestamp archived_after = 8;
  // Optional: include conversations archived before this time
  optional google.protobuf.Timestamp archived_before = 9;
  // Optional: admin/auditor justification, logged for admin access.
  optional string justification = 10;
}

message AdminListConversationsResponse {
  repeated AdminConversationSummary conversations = 1;
  PageInfo page_info = 2;
}

message AdminUpdateConversationRequest {
  // Conversation identifier
  string conversation_id = 1;
  // Set archive state (true = archive, false = restore)
  optional bool archived = 2;
  // Optional: admin justification, logged for admin access.
  optional string justification = 3;
}

message AdminListMembershipsRequest {
  // Conversation identifier
  string conversation_id = 1;
  PageRequest page = 2;
  // Optional: admin/auditor justification, logged for admin access.
  optional string justification = 3;
}

message AdminListForksRequest {
  // Conversation identifier
  string conversation_id = 1;
  reserved 2; // pagination removed; navigation snapshots are complete
  // Optional: admin/auditor justification, logged for admin access.
  optional string justification = 3;
}

message AdminListForksResponse {
  repeated string conversation_ids = 1;
  repeated ConversationForkPoint fork_points = 2;
}

message AdminListChildConversationsRequest {
  // Conversation identifier
  string conversation_id = 1;
  PageRequest page = 2;
  // Optional: admin/auditor justification, logged for admin access.
  optional string justification = 3;
}

message AdminListChildConversationsResponse {
  repeated AdminChildConversationSummary children = 1;
  PageInfo page_info = 2;
}

message AdminConversationSummary {
  string id = 1;
  string title = 2;
  string owner_user_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string last_message_preview = 6;
  AccessLevel access_level = 7;
  string started_by_conversation_id = 8;
  bytes started_by_entry_id = 9;
  bool archived = 10;
  string client_id = 11;
  optional string agent_id = 12;
}

message AdminChildConversationSummary {
  string id = 1;
  string title = 2;
  string owner_user_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string last_message_preview = 6;
  AccessLevel access_level = 7;
  bytes started_by_entry_id = 8;
  bool archived = 9;
  string started_by_conversation_id = 10;
  string client_id = 11;
  optional string agent_id = 12;
}

message AdminConversation {
  string id = 1;
  string title = 2;
  string owner_user_id = 3;
  string created_at = 4;
  string updated_at = 5;
  string last_message_preview = 6;
  AccessLevel access_level = 7;
  string started_by_conversation_id = 8;
  bytes started_by_entry_id = 9;
  bool archived = 10;
  string client_id = 11;
  optional string agent_id = 12;
  google.protobuf.Struct metadata = 13;
  bytes forked_at_entry_id = 14;
  string forked_at_conversation_id = 15;
  bool has_response_in_progress = 16;
}

message Entry {
  // Unique identifier (UUID as 16-byte big-endian binary)
  bytes id = 1;
  // Conversation identifier
  string conversation_id = 2;
  string user_id = 3;
  Channel channel = 4;
  int64 epoch = 5;
  // Describes the schema/format of the content array.
  // History channel entries must use "history" as the content_type.
  // The content array for history entries contains objects with:
  //   - text (string): The message text.
  //   - role (string): Either "USER" or "AI".
  // Other content_types (e.g., "LC4J", "SpringAI") may be used for
  // agent context entries.
  string content_type = 6;
  // For history channel entries (content_type: "history"), each block
  // contains text and role fields.
  repeated google.protobuf.Value content = 7;
  string created_at = 8;
  // Optional client-assigned sequence number, unique within the conversation.
  optional uint32 seq = 9;
  optional string agent_id = 10;
  optional string indexed_content = 11;
  optional google.protobuf.Timestamp indexed_at = 12;
  optional string client_id = 13;
}

message ListMembershipsRequest {
  // Conversation identifier
  string conversation_id = 1;
  PageRequest page = 2;
}

message ListMembershipsResponse {
  repeated ConversationMembership memberships = 1;
  PageInfo page_info = 2;
}

message ShareConversationRequest {
  // Conversation identifier
  string conversation_id = 1;
  string user_id = 2;
  AccessLevel access_level = 3;
}

message UpdateMembershipRequest {
  // Conversation identifier
  string conversation_id = 1;
  string member_user_id = 2;
  AccessLevel access_level = 3;
}

message DeleteMembershipRequest {
  // Conversation identifier
  string conversation_id = 1;
  string member_user_id = 2;
}

// Ownership Transfer messages
message OwnershipTransfer {
  // Transfer identifier (UUID as 16-byte big-endian binary)
  bytes id = 1;
  // Conversation identifier
  string conversation_id = 2;
  string conversation_title = 3;
  string from_user_id = 4;
  string to_user_id = 5;
  string created_at = 6;
}

enum TransferRole {
  TRANSFER_ROLE_UNSPECIFIED = 0;
  SENDER = 1;
  RECIPIENT = 2;
}

message ListOwnershipTransfersRequest {
  TransferRole role = 1;
  PageRequest page = 2;
}

message ListOwnershipTransfersResponse {
  repeated OwnershipTransfer transfers = 1;
  PageInfo page_info = 2;
}

message GetOwnershipTransferRequest {
  // Transfer identifier (UUID as 16-byte big-endian binary)
  bytes transfer_id = 1;
}

message CreateOwnershipTransferRequest {
  // Conversation identifier
  string conversation_id = 1;
  string new_owner_user_id = 2;
}

message AcceptOwnershipTransferRequest {
  // Transfer identifier (UUID as 16-byte big-endian binary)
  bytes transfer_id = 1;
}

message DeleteOwnershipTransferRequest {
  // Transfer identifier (UUID as 16-byte big-endian binary)
  bytes transfer_id = 1;
}

message SearchEntriesRequest {
  string query = 1;
  // Cursor for pagination; uses the same opaque token format as REST afterCursor.
  string after = 2;
  // Maximum number of results to return (default 20)
  int32 limit = 3;
  // Whether to include the full entry in results. Defaults to true.
  optional bool include_entry = 4;
  // Optional search type list. Supported values: "auto", "semantic", "fulltext".
  // Empty defaults to "auto".
  repeated string search_type = 5;
  // Whether to collapse results to one item per conversation. Defaults to true.
  optional bool group_by_conversation = 6;
}

message SearchEntriesResponse {
  repeated SearchResult results = 1;
  string next_cursor = 2;
}

message SearchResult {
  // Conversation identifier
  string conversation_id = 1;
  // Title of the conversation containing this entry
  string conversation_title = 2;
  // Entry identifier (UUID as 16-byte big-endian binary). Always present for deep-linking.
  bytes entry_id = 3;
  float score = 4;
  string highlights = 5;
  // The matched entry. Only included when include_entry is true in the request.
  Entry entry = 6;
}

// Index entries request - flat array of entries to index
message IndexConversationsRequest {
  repeated IndexEntryRequest entries = 1;
}

message IndexEntryRequest {
  // Conversation identifier
  string conversation_id = 1;
  // Entry identifier (UUID as 16-byte big-endian binary)
  bytes entry_id = 2;
  // The searchable text for this entry
  string indexed_content = 3;
}

message IndexConversationsResponse {
  // Number of entries processed
  int32 indexed = 1;
}

// List unindexed entries - for batch indexing discovery
message ListUnindexedEntriesRequest {
  int32 limit = 1;
  optional string cursor = 2;
}

message ListUnindexedEntriesResponse {
  repeated UnindexedEntry entries = 1;
  // Cursor for next page, absent when no more results
  optional string cursor = 2;
}

message UnindexedEntry {
  // Conversation identifier
  string conversation_id = 1;
  Entry entry = 2;
}

// Episodic memory messages
message PutMemoryRequest {
  repeated string namespace = 1;
  string key = 2;
  google.protobuf.Struct value = 3;
  int32 ttl_seconds = 4;
  map<string, string> index = 5;
  optional int64 expected_revision = 6;
  reserved 7;
  reserved "actor";
}

message MemoryWriteResult {
  // Memory identifier (UUID as 16-byte big-endian binary)
  bytes id = 1;
  repeated string namespace = 2;
  string key = 3;
  optional google.protobuf.Struct attributes = 4;
  string created_at = 5;
  optional string expires_at = 6;
  int64 revision = 7;
}

message GetMemoryRequest {
  repeated string namespace = 1;
  string key = 2;
  bool include_usage = 3;
  ArchiveFilter archived = 4;
  reserved 5;
  reserved "actor";
}

message UpdateMemoryRequest {
  repeated string namespace = 1;
  string key = 2;
  optional bool archived = 3;
  optional int64 expected_revision = 4;
  reserved 5;
  reserved "actor";
}

message MemorySearchQuery {
  string text = 1;
  optional string purpose = 2;
}

message MemoryItem {
  // Memory identifier (UUID as 16-byte big-endian binary)
  bytes id = 1;
  repeated string namespace = 2;
  string key = 3;
  google.protobuf.Struct value = 4;
  optional google.protobuf.Struct attributes = 5;
  optional double score = 6;
  string created_at = 7;
  optional string expires_at = 8;
  optional MemoryUsage usage = 9;
  bool archived = 10;
  int64 revision = 11;
  repeated string matched_queries = 12;
}

message SearchMemoriesRequest {
  repeated string namespace_prefix = 1;
  string query = 2;
  optional google.protobuf.Struct filter = 3;
  int32 limit = 4;
  reserved 5;
  bool include_usage = 6;
  ArchiveFilter archived = 7;
  reserved 9;
  reserved "actor";
  repeated MemorySearchQuery queries = 10;
  int32 per_query_limit = 11;
}

message SearchMemoriesResponse {
  repeated MemoryItem items = 1;
}

message ListMemoryNamespacesRequest {
  repeated string prefix = 1;
  repeated string suffix = 2;
  int32 max_depth = 3;
  ArchiveFilter archived = 4;
  reserved 5;
  reserved "actor";
}

message MemoryNamespace {
  repeated string segments = 1;
}

message ListMemoryNamespacesResponse {
  repeated MemoryNamespace namespaces = 1;
}

message MemoryIndexStatusResponse {
  int64 pending = 1;
}

message MemoryUsage {
  int64 fetch_count = 1;
  google.protobuf.Timestamp last_fetched_at = 2;
}

enum MemoryUsageSort {
  MEMORY_USAGE_SORT_UNSPECIFIED = 0;
  FETCH_COUNT = 1;
  LAST_FETCHED_AT = 2;
}

message TopMemoryUsageItem {
  repeated string namespace = 1;
  string key = 2;
  MemoryUsage usage = 3;
}

message ListTopMemoryUsageResponse {
  repeated TopMemoryUsageItem items = 1;
}

message AdminListMemoriesRequest {
  repeated string namespace_prefix = 1;
  optional string key_prefix = 2;
  ArchiveFilter archived = 3;
  optional google.protobuf.Timestamp created_after = 4;
  optional google.protobuf.Timestamp created_before = 5;
  optional google.protobuf.Timestamp expires_before = 6;
  bool include_usage = 7;
  int32 limit = 8;
  optional string after_cursor = 9;
  optional string justification = 10;
}

message AdminGetMemoryRequest {
  bytes id = 1;
  bool include_usage = 2;
  optional string justification = 3;
}

message AdminPutMemoryRequest {
  repeated string namespace = 1;
  string key = 2;
  google.protobuf.Struct value = 3;
  int32 ttl_seconds = 4;
  map<string, string> index = 5;
  optional int64 expected_revision = 6;
  optional string justification = 7;
}

message AdminUpdateMemoryRequest {
  repeated string namespace = 1;
  string key = 2;
  optional bool archived = 3;
  optional int64 expected_revision = 4;
  optional string justification = 5;
}

message AdminDeleteMemoryRequest {
  bytes id = 1;
  optional string justification = 2;
}

message AdminGetMemoryUsageRequest {
  repeated string namespace = 1;
  string key = 2;
  optional string justification = 3;
}

message AdminListTopMemoryUsageRequest {
  repeated string prefix = 1;
  MemoryUsageSort sort = 2;
  int32 limit = 3;
  optional string justification = 4;
}

message AdminGetMemoryIndexStatusRequest {
  optional string justification = 1;
}

message AdminSearchMemoriesRequest {
  repeated string namespace_prefix = 1;
  optional string key_prefix = 2;
  string query = 3;
  optional google.protobuf.Struct filter = 4;
  ArchiveFilter archived = 5;
  bool include_usage = 6;
  int32 limit = 7;
  optional string justification = 8;
  optional string as_user_id = 9;
  repeated MemorySearchQuery queries = 10;
  int32 per_query_limit = 11;
}

message AdminListMemoryNamespacesRequest {
  repeated string namespace_prefix = 1;
  repeated string suffix = 2;
  int32 max_depth = 3;
  ArchiveFilter archived = 4;
  int32 limit = 5;
  optional string after_cursor = 6;
  optional string justification = 7;
}

message AdminMemoryItem {
  bytes id = 1;
  repeated string namespace = 2;
  string key = 3;
  google.protobuf.Struct value = 4;
  optional google.protobuf.Struct attributes = 5;
  optional double score = 6;
  google.protobuf.Timestamp created_at = 7;
  optional google.protobuf.Timestamp expires_at = 8;
  optional google.protobuf.Timestamp archived_at = 9;
  bool archived = 10;
  optional MemoryUsage usage = 11;
  int64 revision = 12;
  repeated string matched_queries = 13;
}

message AdminListMemoriesResponse {
  repeated AdminMemoryItem items = 1;
  optional string after_cursor = 2;
}

message AdminSearchMemoriesResponse {
  repeated AdminMemoryItem items = 1;
}

message AdminListMemoryNamespacesResponse {
  repeated MemoryNamespace namespaces = 1;
  optional string after_cursor = 2;
}

message HealthResponse {
  string status = 1;
}

message CapabilitiesTech {
  string store = 1;
  string attachments = 2;
  string cache = 3;
  string vector = 4;
  string event_bus = 5;
  string embedder = 6;
}

message CapabilitiesFeatures {
  bool outbox_enabled = 1;
  bool semantic_search_enabled = 2;
  bool fulltext_search_enabled = 3;
  bool cors_enabled = 4;
  bool management_listener_enabled = 5;
  bool private_source_urls_enabled = 6;
  bool s3_direct_download_enabled = 7;
}

message CapabilitiesAuth {
  bool oidc_enabled = 1;
  bool api_key_enabled = 2;
  bool admin_justification_required = 3;
  bool user_id_assertion_enabled = 4;
}

message CapabilitiesSecurity {
  bool encryption_enabled = 1;
  bool db_encryption_enabled = 2;
  bool attachment_encryption_enabled = 3;
}

message CapabilitiesResponse {
  string version = 1;
  CapabilitiesTech tech = 2;
  CapabilitiesFeatures features = 3;
  CapabilitiesAuth auth = 4;
  CapabilitiesSecurity security = 5;
}

service SystemService {
  rpc GetHealth(google.protobuf.Empty) returns (HealthResponse);
  rpc GetCapabilities(google.protobuf.Empty) returns (CapabilitiesResponse);
}

service ConversationsService {
  // ListConversations returns conversations the user has access to.
  // The mode parameter controls which conversations from each fork tree are returned.
  // See ConversationListMode for available modes.
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc CreateConversation(CreateConversationRequest) returns (Conversation);
  rpc GetConversation(GetConversationRequest) returns (Conversation);
  rpc UpdateConversation(UpdateConversationRequest) returns (Conversation);
  rpc ListForks(ListForksRequest) returns (ListForksResponse);
  rpc ListChildConversations(ListChildConversationsRequest) returns (ListChildConversationsResponse);
}

service ConversationMembershipsService {
  rpc ListMemberships(ListMembershipsRequest) returns (ListMembershipsResponse);
  rpc ShareConversation(ShareConversationRequest) returns (ConversationMembership);
  rpc UpdateMembership(UpdateMembershipRequest) returns (ConversationMembership);
  rpc DeleteMembership(DeleteMembershipRequest) returns (google.protobuf.Empty);
}

service OwnershipTransfersService {
  // List pending ownership transfers for the current user
  rpc ListOwnershipTransfers(ListOwnershipTransfersRequest) returns (ListOwnershipTransfersResponse);
  // Get a specific ownership transfer
  rpc GetOwnershipTransfer(GetOwnershipTransferRequest) returns (OwnershipTransfer);
  // Create a new ownership transfer (initiates transfer to another user)
  rpc CreateOwnershipTransfer(CreateOwnershipTransferRequest) returns (OwnershipTransfer);
  // Accept an ownership transfer (recipient becomes owner, sender becomes manager)
  rpc AcceptOwnershipTransfer(AcceptOwnershipTransferRequest) returns (google.protobuf.Empty);
  // Delete/cancel an ownership transfer
  rpc DeleteOwnershipTransfer(DeleteOwnershipTransferRequest) returns (google.protobuf.Empty);
}

service EntriesService {
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
  rpc AppendEntry(AppendEntryRequest) returns (Entry);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc SyncEntries(SyncEntriesRequest) returns (SyncEntriesResponse);
}

service AdminEntriesService {
  rpc ListEntries(AdminListEntriesRequest) returns (ListEntriesResponse);
  
  // Get any entry by ID (admin/auditor).
  // Retrieves a conversation entry by its ID, including entries from archived conversations.
  // Requires admin or auditor role.
  rpc GetEntry(AdminGetEntryRequest) returns (Entry);
}

service AdminConversationsService {
  // Get any conversation by ID (bypasses membership check).
  // Requires admin or auditor role.
  rpc GetConversation(AdminGetConversationRequest) returns (AdminConversation);

  // List conversations with admin filters (cross-user access).
  // Requires admin or auditor role.
  rpc ListConversations(AdminListConversationsRequest) returns (AdminListConversationsResponse);

  // Update conversation archive state.
  // Requires admin role (not auditor - write operation).
  rpc UpdateConversation(AdminUpdateConversationRequest) returns (AdminConversation);

  // List conversation memberships (any conversation).
  // Requires admin or auditor role.
  rpc ListMemberships(AdminListMembershipsRequest) returns (ListMembershipsResponse);

  // List conversation forks (any conversation).
  // Requires admin or auditor role.
  rpc ListForks(AdminListForksRequest) returns (AdminListForksResponse);

  // List child conversations (any conversation).
  // Requires admin or auditor role.
  rpc ListChildConversations(AdminListChildConversationsRequest) returns (AdminListChildConversationsResponse);
}

service SearchService {
  rpc SearchConversations(SearchEntriesRequest) returns (SearchEntriesResponse);
  // Index conversation entries for search. Requires indexer or admin role.
  rpc IndexConversations(IndexConversationsRequest) returns (IndexConversationsResponse);
  // List entries needing indexing. Requires indexer or admin role.
  rpc ListUnindexedEntries(ListUnindexedEntriesRequest) returns (ListUnindexedEntriesResponse);
}

service MemoriesService {
  rpc PutMemory(PutMemoryRequest) returns (MemoryWriteResult);
  rpc GetMemory(GetMemoryRequest) returns (MemoryItem);
  rpc UpdateMemory(UpdateMemoryRequest) returns (google.protobuf.Empty);
  rpc SearchMemories(SearchMemoriesRequest) returns (SearchMemoriesResponse);
  rpc ListMemoryNamespaces(ListMemoryNamespacesRequest) returns (ListMemoryNamespacesResponse);
  rpc ListMemoryEvents(ListMemoryEventsRequest) returns (ListMemoryEventsResponse);
}

message ListMemoryEventsRequest {
  repeated string namespace = 1;
  repeated string kinds = 2;
  optional google.protobuf.Timestamp after = 3;
  optional google.protobuf.Timestamp before = 4;
  optional string after_cursor = 5;
  int32 limit = 6;
}

message MemoryEventItem {
  bytes id = 1;
  repeated string namespace = 2;
  string key = 3;
  string kind = 4;
  google.protobuf.Timestamp occurred_at = 5;
  google.protobuf.Struct value = 6;
  google.protobuf.Struct attributes = 7;
  optional google.protobuf.Timestamp expires_at = 8;
}

message ListMemoryEventsResponse {
  repeated MemoryEventItem events = 1;
  optional string after_cursor = 2;
}

service AdminMemoriesService {
  rpc ListMemories(AdminListMemoriesRequest) returns (AdminListMemoriesResponse);
  rpc GetMemory(AdminGetMemoryRequest) returns (AdminMemoryItem);
  rpc SearchMemories(AdminSearchMemoriesRequest) returns (AdminSearchMemoriesResponse);
  rpc ListNamespaces(AdminListMemoryNamespacesRequest) returns (AdminListMemoryNamespacesResponse);
  rpc DeleteMemory(AdminDeleteMemoryRequest) returns (google.protobuf.Empty);
  rpc GetMemoryUsage(AdminGetMemoryUsageRequest) returns (MemoryUsage);
  rpc ListTopMemoryUsage(AdminListTopMemoryUsageRequest) returns (ListTopMemoryUsageResponse);
  rpc GetMemoryIndexStatus(AdminGetMemoryIndexStatusRequest) returns (MemoryIndexStatusResponse);
  rpc PutMemory(AdminPutMemoryRequest) returns (MemoryWriteResult);
  rpc UpdateMemory(AdminUpdateMemoryRequest) returns (google.protobuf.Empty);
}

service ResponseRecorderService {
  // Record response content for a conversation (client streaming, unary response)
  rpc Record(stream RecordRequest) returns (RecordResponse);

  // Replay a recording of a conversation
  rpc Replay(ReplayRequest) returns (stream ReplayResponse);

  // Cancel an in-progress recording
  rpc Cancel(CancelRecordRequest) returns (CancelRecordResponse);

  // Check if response recorder is enabled
  rpc IsEnabled(google.protobuf.Empty) returns (IsEnabledResponse);

  // Check which conversations have active recordings
  rpc CheckRecordings(CheckRecordingsRequest) returns (CheckRecordingsResponse);
}

enum RecordStatus {
  RECORD_STATUS_UNSPECIFIED = 0;
  RECORD_STATUS_SUCCESS = 1;
  RECORD_STATUS_CANCELLED = 2;
  RECORD_STATUS_ERROR = 3;
}

message RecordRequest {
  // Conversation identifier (required in first message)
  string conversation_id = 1;
  string content = 2;          // Content chunk
  bool complete = 3;           // Set to true in final message
}

message RecordResponse {
  RecordStatus status = 1;
  string error_message = 2;    // Only set when status = ERROR
}

message ReplayRequest {
  // Conversation identifier
  string conversation_id = 1;
}

message ReplayResponse {
  string content = 1;              // Content chunk
  string redirect_address = 2;    // Set when redirect is needed (format: "host:port")
}

message CancelRecordRequest {
  // Conversation identifier
  string conversation_id = 1;
}

message CancelRecordResponse {
  bool accepted = 1;
  string redirect_address = 2;    // Set when redirect is needed (format: "host:port")
}

message IsEnabledResponse {
  bool enabled = 1;
}

message CheckRecordingsRequest {
  // Conversation identifiers
  repeated string conversation_ids = 1;
}

message CheckRecordingsResponse {
  // Conversation IDs with active recordings
  repeated string conversation_ids = 1;
}

service AttachmentsService {
  // Upload a file as a stream of chunks. First message must contain metadata.
  // Subsequent messages contain file data chunks.
  // Server responds once the upload is complete or an error occurs.
  rpc UploadAttachment(stream UploadAttachmentRequest) returns (UploadAttachmentResponse);
  rpc CreateAttachmentFromUrl(CreateAttachmentFromUrlRequest) returns (UploadAttachmentResponse);

  // Retrieve attachment metadata (not the file content).
  rpc GetAttachment(GetAttachmentRequest) returns (AttachmentInfo);

  // Download a file as a stream of chunks.
  rpc DownloadAttachment(DownloadAttachmentRequest) returns (stream DownloadAttachmentResponse);
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (google.protobuf.Empty);
  rpc GetAttachmentDownloadUrl(GetAttachmentDownloadUrlRequest) returns (AttachmentDownloadUrlResponse);
}

message UploadAttachmentRequest {
  oneof payload {
    // First message: upload metadata (required)
    UploadMetadata metadata = 1;
    // Subsequent messages: file data chunks
    bytes chunk = 2;
  }
}

message UploadMetadata {
  string filename = 1;
  string content_type = 2;
  // ISO 8601 duration (e.g., "PT1H"). Empty = server default.
  string expires_in = 3;
}

message CreateAttachmentFromUrlRequest {
  string source_url = 1;
  string content_type = 2;
  string filename = 3;
}

message UploadAttachmentResponse {
  string id = 1;
  string href = 2;
  string content_type = 3;
  string filename = 4;
  int64 size = 5;
  string sha256 = 6;
  string expires_at = 7;
  string status = 8;
  string source_url = 9;
}

message GetAttachmentRequest {
  string id = 1;
}

message AttachmentInfo {
  string id = 1;
  string href = 2;
  string content_type = 3;
  string filename = 4;
  int64 size = 5;
  string sha256 = 6;
  string expires_at = 7;
  string created_at = 8;
  string status = 9;
  string source_url = 10;
  optional bytes entry_id = 11;
}

message DownloadAttachmentRequest {
  string id = 1;
}

message DeleteAttachmentRequest {
  string id = 1;
}

message GetAttachmentDownloadUrlRequest {
  string id = 1;
  optional string disposition = 2;
}

message AttachmentDownloadUrlResponse {
  string url = 1;
  int32 expires_in = 2;
  string status = 3;
}

message DownloadAttachmentResponse {
  oneof payload {
    // First message: attachment metadata
    AttachmentInfo metadata = 1;
    // Subsequent messages: file data chunks
    bytes chunk = 2;
  }
}

service EventStreamService {
  // Subscribe to real-time events (server streaming).
  // Events are filtered by the caller's conversation group membership.
  // For authorized scope, a trusted client's `x-user-id` metadata selects the
  // effective user. Admin scope ignores `x-user-id`.
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream EventNotification);
}

service AdminCheckpointService {
  rpc GetCheckpoint(GetCheckpointRequest) returns (AdminCheckpoint);
  rpc PutCheckpoint(PutCheckpointRequest) returns (AdminCheckpoint);
}

message GetCheckpointRequest {
  string client_id = 1;
}

message PutCheckpointRequest {
  string client_id = 1;
  string content_type = 2;
  google.protobuf.Value value = 3;
}

message AdminCheckpoint {
  string client_id = 1;
  string content_type = 2;
  google.protobuf.Value value = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message SubscribeEventsRequest {
  // Optional: subscribe to specific conversation IDs only.
  repeated string conversation_ids = 1;
  // Optional: filter by event kinds (conversation, entry, response, membership).
  repeated string kinds = 2;
  // Optional: durable replay cursor. Omit for tail-only mode.
  optional string after_cursor = 3;
  // Optional: event detail mode. Supported values are "summary" and "full".
  optional string detail = 4;
  // Optional: event scope. Defaults to caller-authorized membership scope.
  optional EventScope scope = 5;
  // Optional: admin/auditor justification, logged for admin scope.
  optional string justification = 6;
  // Optional: entry channel filter for entry events. Defaults to ["history"].
  repeated string entry_channels = 7;
  // Optional: entry content type filter for entry events. Empty means any.
  repeated string entry_content_types = 8;
  // Optional: entry role filter for entry events. Empty means any.
  repeated string entry_roles = 9;
}

message EventNotification {
  // Action: created, updated, deleted, phase, evicted, invalidate
  string event = 1;
  // Resource type: conversation, entry, response, membership, stream
  string kind = 2;
  // Kind-specific payload as JSON-encoded bytes.
  bytes data = 3;
  // Durable replay cursor when available.
  optional string cursor = 4;
}
