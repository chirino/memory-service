# yaml-language-server: $schema=https://taskfile.dev/schema.json
# install task from: https://taskfile.dev/docs/installation
version: '3'

dotenv: ['.env']

vars:
  DEFAULT_GOTESTSUM_FMT: standard-quiet # e.g. task test:go GOTESTSUM_FMT=standard-verbose
  KIND_CLUSTER_NAME: memory-service
  ENVOY_GATEWAY_VERSION: v1.7.0
  OVERLAY: '{{.OVERLAY | default "postgresql-infinispan"}}'
  PYTHON_DOCKER_IMAGE: astral/uv:python3.11-bookworm
  GRPC_TOOLS_VERSION: "1.74.0"
  

tasks:

  site:
    desc: Run the site in dev mode.
    dir: site
    cmds:
      - npm i
      - npm run dev

  image:memory-service:
    desc: Build the memory-service container image
    cmds:
      - docker build -t ghcr.io/chirino/memory-service:latest -f Dockerfile .

  image:chat-quarkus:
    desc: Build the chat-quarkus container image
    cmds:
      - docker build -t ghcr.io/chirino/memory-service-chat-quarkus:latest -f java/quarkus/examples/chat-quarkus/Dockerfile .

  generate:
    desc: "generate and format source files"
    deps: # these seem safe to run concurrently.
      - generate:typescript
      - generate:python
      - generate:site
      - generate:spotless
      - generate:chat-frontend
    cmds:
      - task: generate:go # seems to break if you run concurrenlty

  generate:go:
    internal: true
    cmds:
      - go generate ./...

  generate:chat-frontend:
    internal: true
    dir: frontends/chat-frontend
    cmds:
      - npm ci
      - npm run generate

  generate:python:
    internal: true
    cmds:
      - docker run --rm -e GRPC_TOOLS_VERSION={{.GRPC_TOOLS_VERSION}} -v "{{.TASKFILE_DIR}}:/workspace" -w /workspace/python {{.PYTHON_DOCKER_IMAGE}} ./scripts/generate-grpc-stubs.sh

  build:python:langchain:
    cmds:
      - docker run --rm -v "{{.TASKFILE_DIR}}:/workspace" -w /workspace/python/langchain {{.PYTHON_DOCKER_IMAGE}} uv build

  verify:python:
    cmds:
      - task: generate:python
      - task: build:python:langchain
      - docker run --rm -v "{{.TASKFILE_DIR}}:/workspace" -w /workspace/python {{.PYTHON_DOCKER_IMAGE}} sh -lc 'uv venv /tmp/memory-service-python && uv pip install --python /tmp/memory-service-python/bin/python ./langchain && /tmp/memory-service-python/bin/python -c "import memory_service_langchain"'

  generate:site:
    internal: true
    dir: site
    cmds:
      - npm ci
      - npm run prettier

  generate:typescript:
    cmds:
      - |
        npx prettier -w \
          "typescript/vercelai/src/**/*.{ts,tsx,js}" \
          "typescript/examples/vecelai/chat-vecelai-ts/src/**/*.{ts,tsx,js}" \
          "typescript/examples/vecelai/doc-checkpoints/*/src/**/*.{ts,tsx,js}"

  generate:spotless:
    internal: true
    cmds:
      - ./java/mvnw -q -B -T 1C -f java/pom.xml spotless:apply

  test:
    desc: Test go and java
    deps:
      - test:go
      - test:java

  install:go:
    desc: install go binary
    cmds:
      - |
        CGO_ENABLED=1 go install -tags='sqlite_fts5' . {{.CLI_ARGS}}

  test:go:
    desc: Test go
    cmds:
      - |
        CGO_ENABLED=1 go run gotest.tools/gotestsum --format {{.GOTESTSUM_FMT | default .DEFAULT_GOTESTSUM_FMT}} -- -race -tags='sqlite_fts5' ./... {{.CLI_ARGS}}

  test:java:
    desc: Test java
    cmds:
      - ./java/mvnw -T 1C -f java/pom.xml clean test {{.CLI_ARGS}}

  test:site:
    desc: Test site examples
    env:
      SITE_TEST_BUILD_OUTPUT: '{{.SITE_TEST_BUILD_OUTPUT | default "on-fail"}}'
    cmds:
      - |
        CGO_ENABLED=1 go run gotest.tools/gotestsum --format {{.GOTESTSUM_FMT | default .DEFAULT_GOTESTSUM_FMT}} -- -race -tags='site_tests sqlite_fts5' ./internal/sitebdd/ {{.CLI_ARGS}}

  test:site:record-missing:
    desc: Run site tests and record only missing OpenAI fixtures
    env:
      SITE_TEST_RECORD: missing
      SITE_TEST_BUILD_OUTPUT: '{{.SITE_TEST_BUILD_OUTPUT | default "on-fail"}}'
    cmds:
      - |
        CGO_ENABLED=1 go run gotest.tools/gotestsum --format {{.GOTESTSUM_FMT | default .DEFAULT_GOTESTSUM_FMT}} -- -race -tags='site_tests sqlite_fts5' ./internal/sitebdd/ {{.CLI_ARGS}}

  test:site:record-all:
    desc: Run site tests and re-record all OpenAI fixtures
    env:
      SITE_TEST_RECORD: all
      SITE_TEST_BUILD_OUTPUT: '{{.SITE_TEST_BUILD_OUTPUT | default "on-fail"}}'
    cmds:
      - |
        CGO_ENABLED=1 go run gotest.tools/gotestsum --format {{.GOTESTSUM_FMT | default .DEFAULT_GOTESTSUM_FMT}} -- -race -tags='site_tests sqlite_fts5' ./internal/sitebdd/ {{.CLI_ARGS}}

  test:site:update-curl-examples:
    desc: Run site tests, capture curl outputs, and sync docs exampleOutput blocks
    env:
      SITE_TEST_CAPTURE_CURL_OUTPUT: '{{.SITE_TEST_CAPTURE_CURL_OUTPUT | default "missing"}}'
      SITE_TEST_BUILD_OUTPUT: '{{.SITE_TEST_BUILD_OUTPUT | default "on-fail"}}'
    cmds:
      - |
        cd site
        npm i
        npm run build
      - |
        CGO_ENABLED=1 go run gotest.tools/gotestsum --format {{.GOTESTSUM_FMT | default .DEFAULT_GOTESTSUM_FMT}} -- -race -tags='site_tests sqlite_fts5' ./internal/sitebdd/ {{.CLI_ARGS}}
      - go run ./internal/cmd/sync_curl_examples --apply

  dev:memory-service:
    desc: Run the memory-service app in dev mode.
    env:
      MEMORY_SERVICE_PORT: 8082
      # ── Datastore ──────────────────────────────────────────────
      MEMORY_SERVICE_DB_URL: postgres://postgres:postgres@localhost:5432/memory_service?sslmode=disable
      MEMORY_SERVICE_DB_MIGRATE_AT_START: "true"
      # ── Cache ──────────────────────────────────────────────────
      MEMORY_SERVICE_CACHE_KIND: redis
      MEMORY_SERVICE_REDIS_HOSTS: redis://localhost:6379
      # ── Event outbox ──────────────────────────────────────────
      MEMORY_SERVICE_OUTBOX_ENABLED: "true"
      # ── Authentication & authorization ─────────────────────────
      MEMORY_SERVICE_OIDC_ISSUER: http://localhost:8081/realms/memory-service
      MEMORY_SERVICE_OIDC_DISCOVERY_URL: http://localhost:8081/realms/memory-service
      MEMORY_SERVICE_ROLES_ADMIN_OIDC_ROLE: admin
      MEMORY_SERVICE_ROLES_AUDITOR_OIDC_ROLE: auditor
      MEMORY_SERVICE_ROLES_INDEXER_CLIENTS: agent
      MEMORY_SERVICE_API_KEYS_AGENT: agent-api-key-1
      # ── CORS ───────────────────────────────────────────────────
      MEMORY_SERVICE_CORS_ENABLED: "true"
      MEMORY_SERVICE_CORS_ORIGINS: http://localhost:3000
      # ── Observability ──────────────────────────────────────────
      MEMORY_SERVICE_PROMETHEUS_URL: http://localhost:9092
      # ── Encryption ─────────────────────────────────────────────
      MEMORY_SERVICE_ENCRYPTION_KIND: dek
      MEMORY_SERVICE_ENCRYPTION_DEK_KEY: '{{.MEMORY_SERVICE_ENCRYPTION_DEK_KEY | default "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"}}'
      # ── Attachments ────────────────────────────────────────────
      MEMORY_SERVICE_ATTACHMENTS_KIND: s3
      MEMORY_SERVICE_ATTACHMENTS_S3_BUCKET: memory-service-attachments
      MEMORY_SERVICE_ATTACHMENTS_S3_USE_PATH_STYLE: "true"
      AWS_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      # ── Vector search ──────────────────────────────────────────
      MEMORY_SERVICE_VECTOR_KIND: qdrant
      MEMORY_SERVICE_VECTOR_QDRANT_HOST: localhost
      MEMORY_SERVICE_VECTOR_QDRANT_PORT: "6334"
      MEMORY_SERVICE_VECTOR_QDRANT_API_KEY: change-me
      # ── Embeddings ─────────────────────────────────────────────
      MEMORY_SERVICE_EMBEDDING_KIND: '{{.MEMORY_SERVICE_EMBEDDING_KIND | default "openai"}}'
      MEMORY_SERVICE_OPENAI_API_KEY: '{{.OPENAI_API_KEY | default "none"}}'
    cmds:
      - docker compose up -d qdrant postgres redis keycloak prometheus minio minio-init
      - docker compose stop memory-service >/dev/null 2>&1 || true
      - air -root . -c deploy/dev/air.toml

  dev:memory-service-pgvector:
    desc: Run the memory-service app in dev mode with pgvector (for knowledge clustering).
    env:
      MEMORY_SERVICE_PORT: 8082
      # ── Datastore ──────────────────────────────────────────────
      MEMORY_SERVICE_DB_URL: postgres://postgres:postgres@localhost:5432/memory_service?sslmode=disable
      MEMORY_SERVICE_DB_MIGRATE_AT_START: "true"
      # ── Cache ──────────────────────────────────────────────────
      MEMORY_SERVICE_CACHE_KIND: redis
      MEMORY_SERVICE_REDIS_HOSTS: redis://localhost:6379
      # ── Authentication & authorization ─────────────────────────
      MEMORY_SERVICE_OIDC_ISSUER: http://localhost:8081/realms/memory-service
      MEMORY_SERVICE_OIDC_DISCOVERY_URL: http://localhost:8081/realms/memory-service
      MEMORY_SERVICE_ROLES_ADMIN_OIDC_ROLE: admin
      MEMORY_SERVICE_ROLES_ADMIN_CLIENTS: agent
      MEMORY_SERVICE_ROLES_AUDITOR_OIDC_ROLE: auditor
      MEMORY_SERVICE_ROLES_INDEXER_CLIENTS: agent
      MEMORY_SERVICE_API_KEYS_AGENT: agent-api-key-1
      # ── CORS ───────────────────────────────────────────────────
      MEMORY_SERVICE_CORS_ENABLED: "true"
      MEMORY_SERVICE_CORS_ORIGINS: http://localhost:3000
      # ── Observability ──────────────────────────────────────────
      MEMORY_SERVICE_PROMETHEUS_URL: http://localhost:9092
      # ── Encryption ─────────────────────────────────────────────
      MEMORY_SERVICE_ENCRYPTION_KIND: dek
      MEMORY_SERVICE_ENCRYPTION_DEK_KEY: '{{.MEMORY_SERVICE_ENCRYPTION_DEK_KEY | default "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"}}'
      # ── Attachments ────────────────────────────────────────────
      MEMORY_SERVICE_ATTACHMENTS_KIND: s3
      MEMORY_SERVICE_ATTACHMENTS_S3_BUCKET: memory-service-attachments
      MEMORY_SERVICE_ATTACHMENTS_S3_USE_PATH_STYLE: "true"
      AWS_ENDPOINT_URL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      # ── Vector search (pgvector) ────────────────────────────────
      MEMORY_SERVICE_VECTOR_KIND: pgvector
      # ── Embeddings ─────────────────────────────────────────────
      MEMORY_SERVICE_EMBEDDING_KIND: '{{.MEMORY_SERVICE_EMBEDDING_KIND | default "openai"}}'
      MEMORY_SERVICE_OPENAI_API_KEY: '{{.OPENAI_API_KEY | default "none"}}'
      # ── Knowledge clustering ────────────────────────────────────
      MEMORY_SERVICE_KNOWLEDGE_CLUSTERING_ENABLED: "true"
    cmds:
      - docker compose up -d postgres redis keycloak prometheus minio minio-init
      - docker compose stop memory-service >/dev/null 2>&1 || true
      - air -root . -c deploy/dev/air.toml

  dev:chat-quarkus:
    desc: Run the chat-quarkus app in dev mode. Use quick=true to skip npm install and dependency compilation.
    cmds:
      - cmd: cd frontends/chat-frontend && npm i
        if: '{{eq .quick ""}}'
      - cmd: ./java/mvnw -T 1C -f java/pom.xml install -pl :memory-service-extension-deployment -am -DskipTests
        if: '{{eq .quick ""}}'
      - docker compose stop chat-quarkus >/dev/null 2>&1 || true
      - ./java/mvnw -T 1C -f java/pom.xml -pl :chat-quarkus quarkus:dev -Dquarkus.profile=alt

  dev:chat-langchain:
    desc: Run the chat-langchain app in dev mode. Use quick=true to skip frontend install/build and package compilation.
    cmds:
      - cmd: cd frontends/chat-frontend && sh ./docker-npm-build.sh
        if: '{{eq .quick ""}}'
      - cmd: uv --directory=python/langchain build
        if: '{{eq .quick ""}}'
      - cmd: docker compose stop chat-quarkus >/dev/null 2>&1 || true
      - |
        set -e
        unset VIRTUAL_ENV
        export UV_FIND_LINKS=$(pwd)/python/dist
        cd python/examples/langchain/chat-langchain
        uv sync --reinstall-package memory-service-langchain
        uv run python app.py

  dev:chat-langgraph:
    desc: Run the chat-langgraph app in dev mode. Use quick=true to skip frontend install/build and package compilation.
    cmds:
      - cmd: cd frontends/chat-frontend && sh ./docker-npm-build.sh
        if: '{{eq .quick ""}}'
      - cmd: uv --directory=python/langchain build
        if: '{{eq .quick ""}}'
      - cmd: docker compose stop chat-quarkus >/dev/null 2>&1 || true
      - |
        set -e
        unset VIRTUAL_ENV
        export UV_FIND_LINKS=$(pwd)/python/dist
        cd python/examples/langgraph/chat-langgraph
        uv sync --reinstall-package memory-service-langchain
        uv run python app.py

  secrets:
    desc: Create memory-service secret from current shell environment variables
    cmds:
      - |
        kubectl create secret generic memory-service \
          --namespace memory-service \
          --from-literal=MEMORY_SERVICE_EMBEDDING_OPENAI_API_KEY="${MEMORY_SERVICE_EMBEDDING_OPENAI_API_KEY:-${OPENAI_API_KEY}}" \
          --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY}" \
          --from-literal=OPENAI_BASE_URL="${OPENAI_BASE_URL:-https://api.openai.com}" \
          --dry-run=client -o yaml | kubectl apply -f -

  deploy:
    desc: "Deploy an overlay to the kind cluster (usage: task deploy OVERLAY={{.OVERLAY}})"
    cmds:
      - kubectl apply -k deploy/kustomize/overlays/{{.OVERLAY}}
  undeploy:
    desc: "Remove the deployed overlay (usage: task undeploy OVERLAY={{.OVERLAY}})"
    cmds:
      - kubectl delete -k deploy/kustomize/overlays/{{.OVERLAY}} --ignore-not-found

  kind:deploy:
    desc: "Deploy to kind the overlay (usage: task kind:deploy OVERLAY={{.OVERLAY}})"
    cmds:
      - kubectl apply -k deploy/kustomize/envs/kind/overlays/{{.OVERLAY}}
      - task: secrets
      - kubectl set env deployment/memory-service -n memory-service --from=secret/memory-service

  kind:undeploy:
    desc: "Remove the deployed overlay (usage: task kind:undeploy OVERLAY={{.OVERLAY}})"
    cmds:
      - kubectl delete -k deploy/kustomize/envs/kind/overlays/{{.OVERLAY}} --ignore-not-found

  kind:load:memory-service:
    deps:
      - image:memory-service
    cmds:
      - kind load docker-image ghcr.io/chirino/memory-service:latest --name {{.KIND_CLUSTER_NAME}}
      - kubectl rollout restart deployment/memory-service -n memory-service 2>/dev/null || true

  kind:load:chat-quarkus:
    deps:
      - image:chat-quarkus
    cmds:
      - kind load docker-image ghcr.io/chirino/memory-service-chat-quarkus:latest --name {{.KIND_CLUSTER_NAME}}
      - kubectl rollout restart deployment/chat-quarkus -n memory-service 2>/dev/null || true

  kind:load:
    deps:
      - kind:load:memory-service
      - kind:load:chat-quarkus

  kind:rm:
    desc: Delete the kind cluster
    silent: true
    cmds:
      - kind delete cluster --name {{.KIND_CLUSTER_NAME}} 2>/dev/null || true

  kind:reset:
    desc: Delete and recreate the kind cluster, then deploy
    cmds:
      - task: kind:rm
      - task: kind:init

  kind:init:
    desc: "Deploy to kind: demo + gateway + hostNetwork"
    silent: true
    cmds:
      - |
        if ! kind get clusters 2>/dev/null | grep -q '^{{.KIND_CLUSTER_NAME}}$'; then
          kind create cluster --name {{.KIND_CLUSTER_NAME}} --config deploy/kind-config.yaml
          kubectl cluster-info --context kind-{{.KIND_CLUSTER_NAME}}
        fi
      - |
        if ! kubectl get deployment envoy-gateway -n envoy-gateway-system 2>/dev/null; then
          kubectl apply --server-side --force-conflicts -f https://github.com/envoyproxy/gateway/releases/download/{{.ENVOY_GATEWAY_VERSION}}/install.yaml
          kubectl wait --timeout=5m -n envoy-gateway-system deployment/envoy-gateway --for=condition=Available
          kubectl apply -f deploy/kustomize/components/gateway-envoy/gatewayclass.yaml
        fi
      - kubectl apply -f deploy/kustomize/envs/kind/base/envoyproxy.yaml
      - task: kind:load
      - task: kind:deploy
      - |
        echo ""
        echo "Waiting for all pods to be ready..."
        timeout=300
        elapsed=0
        while [ $elapsed -lt $timeout ]; do
          not_ready=$(kubectl get pods -A --no-headers 2>/dev/null | grep -v 'Running\|Completed\|Succeeded' || true)
          if [ -z "$not_ready" ]; then
            total=$(kubectl get pods -A --no-headers 2>/dev/null | grep -c 'Running' || echo "0")
            echo "All $total pod(s) across all namespaces are running!"
            break
          fi
          echo "--- Pods not yet ready (${elapsed}s elapsed) ---"
          echo "$not_ready"
          echo ""
          sleep 5
          elapsed=$((elapsed + 5))
        done
        if [ $elapsed -ge $timeout ]; then
          echo "WARNING: Timed out waiting for pods after ${timeout}s. Current status:"
          kubectl get pods -A
        fi
      - |
        echo ""
        echo "Overlay: {{.OVERLAY}}"
        echo "Waiting for Gateway to be programmed..."
        kubectl wait -n memory-service gateway/memory-service-gateway --for=condition=Programmed --timeout=2m 2>/dev/null || true
      - task: kind:urls

  kind:urls:
    desc: Show services of the kind cluster
    silent: true
    cmds:
      - |
        echo ""
        echo "Services available at:"
        echo "  Chat:           http://chat.127.0.0.1.nip.io               (bob/bob or alice/alice)"
        echo "  Keycloak:       http://keycloak.127.0.0.1.nip.io           (admin/admin)"
        echo "  Grafana:        http://grafana.127.0.0.1.nip.io/grafana/   (admin/admin)"
        echo "  Prometheus:     http://prometheus.127.0.0.1.nip.io/prometheus/"
        echo "  MinIO Console:  http://minio.127.0.0.1.nip.io              (minioadmin/minioadmin)"
