apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: kind-proxy
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: ClusterIP
      envoyDeployment:
        replicas: 1
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  # Kind-only: bind Envoy to the local test node network so host browser
                  # traffic can reach the demo gateway. Do not reuse in production overlays.
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
