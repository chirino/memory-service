apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../overlays/mongodb-redis

components:
  - ../../base

patches:
  - target:
      kind: ConfigMap
      name: memory-service-config
    patch: |
      - op: add
        path: /data/MEMORY_SERVICE_ATTACHMENTS_KIND
        value: s3
      - op: add
        path: /data/MEMORY_SERVICE_EMBEDDING_KIND
        value: openai
