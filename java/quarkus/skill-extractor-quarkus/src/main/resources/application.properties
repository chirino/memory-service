# ── Skill Extractor Configuration ──────────────────────────

# Memory Service connectivity
skill.memory-service.base-url=${MEMORY_SERVICE_URL:http://localhost:8082}
skill.memory-service.api-key=${SKILL_EXTRACTOR_API_KEY:cognition-api-key-1}
skill.memory-service.client-id=${SKILL_EXTRACTOR_CLIENT_ID:cognition-processor}

# Extraction settings
skill.extraction.enabled=${SKILL_EXTRACTION_ENABLED:true}
skill.extraction.schedule=${SKILL_EXTRACTION_SCHEDULE:0 */10 * * * ?}
skill.extraction.max-entries-per-cluster=${SKILL_EXTRACTION_MAX_ENTRIES:5}
skill.extraction.min-cluster-members=${SKILL_EXTRACTION_MIN_MEMBERS:5}
skill.extraction.max-skills-per-cluster=${SKILL_EXTRACTION_MAX_SKILLS:10}

# ── LangChain4j Model Configuration ───────────────────────

quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:test-openai-key}
quarkus.langchain4j.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}/v1
quarkus.langchain4j.openai.chat-model.model-name=${SKILL_EXTRACTOR_MODEL:gpt-4o-mini}
quarkus.langchain4j.openai.chat-model.response-format=json
quarkus.langchain4j.openai.timeout=120s

# ── HTTP server (health/readiness only) ────────────────────

quarkus.http.port=${SKILL_EXTRACTOR_PORT:8090}

# ── Logging ────────────────────────────────────────────────

quarkus.log.category."io.github.chirino.cognition".level=DEBUG
